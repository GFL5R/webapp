<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="240" height="240">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(60,60)" filter="url(#glow)">

    <!-- Outer ring: mostly solid, small gaps at N/E/S/W -->
    <!-- Arc = 80°, gap = 10°, centered so gaps fall exactly on cardinals -->
    <!-- Gaps at 0°(top), 90°(right), 180°(bottom), 270°(left)          -->
    <!-- So arcs run: 5°→85°, 95°→175°, 185°→265°, 275°→355°           -->
    <g fill="none" stroke="#00ffe0" stroke-width="2" stroke-linecap="butt">
      <path d="M 6.6,-37.4 A 38,38 0 0,1 37.4,-6.6"   />
      <path d="M 37.4,6.6  A 38,38 0 0,1 6.6,37.4"    />
      <path d="M -6.6,37.4 A 38,38 0 0,1 -37.4,6.6"   />
      <path d="M -37.4,-6.6 A 38,38 0 0,1 -6.6,-37.4" />
    </g>

    <!-- Tick marks sitting in the gaps at each cardinal, pointing inward -->
    <g stroke="#00ffe0" stroke-width="2.5" stroke-linecap="square">
      <line x1="0" y1="-38" x2="0" y2="-27" transform="rotate(0)"/>
      <line x1="0" y1="-38" x2="0" y2="-27" transform="rotate(90)"/>
      <line x1="0" y1="-38" x2="0" y2="-27" transform="rotate(180)"/>
      <line x1="0" y1="-38" x2="0" y2="-27" transform="rotate(270)"/>
    </g>

    <!-- Inner ring, solid -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00ffe0" stroke-width="1.2" opacity="0.65"/>

    <!-- 4 inner ticks -->
    <g stroke="#00ffe0" stroke-width="1.5" stroke-linecap="square">
      <line x1="0" y1="-22" x2="0" y2="-15" transform="rotate(0)"/>
      <line x1="0" y1="-22" x2="0" y2="-15" transform="rotate(90)"/>
      <line x1="0" y1="-22" x2="0" y2="-15" transform="rotate(180)"/>
      <line x1="0" y1="-22" x2="0" y2="-15" transform="rotate(270)"/>
    </g>

    <!-- Center -->
    <circle cx="0" cy="0" r="7" fill="none" stroke="#00ffe0" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#00ffe0"/>

  </g>
</svg>
