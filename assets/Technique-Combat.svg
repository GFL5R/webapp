<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bloom"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg"><stop offset="0%" stop-color="#ff4400" stop-opacity="0.2"/><stop offset="100%" stop-color="#06090d" stop-opacity="0"/></radialGradient>
  </defs>
  <g transform="translate(60,60)">
    <circle cx="0" cy="0" r="55" fill="url(#bg)"/>
    <g filter="url(#glow)">

      <!-- Outer tactical square, rotated 45deg (diamond orientation) -->
      <rect x="-34" y="-34" width="68" height="68" rx="3"
            fill="none" stroke="#ff5500" stroke-width="1.5"
            transform="rotate(45)" opacity="0.5"/>

      <!-- Corner L-brackets at the four diamond points (N/E/S/W) -->
      <path d="M0,-48 L-8,-40 M0,-48 L8,-40" fill="none" stroke="#ff5500" stroke-width="2.2" stroke-linecap="square"/>
      <path d="M48,0 L40,-8 M48,0 L40,8"     fill="none" stroke="#ff5500" stroke-width="2.2" stroke-linecap="square"/>
      <path d="M0,48 L-8,40 M0,48 L8,40"     fill="none" stroke="#ff5500" stroke-width="2.2" stroke-linecap="square"/>
      <path d="M-48,0 L-40,-8 M-48,0 L-40,8" fill="none" stroke="#ff5500" stroke-width="2.2" stroke-linecap="square"/>

      <!-- Bullet path: top-left to bottom-right, dashed entry then solid -->
      <line x1="-48" y1="-48" x2="-16" y2="-16"
            stroke="#ff6633" stroke-width="1.5" stroke-dasharray="5 3"
            opacity="0.55" stroke-linecap="round"/>
      <!-- Solid punch through center -->
      <line x1="-16" y1="-16" x2="16" y2="16"
            stroke="#ff8855" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Exit: two diverging fragments -->
      <line x1="16" y1="16" x2="42" y2="34"
            stroke="#ff5500" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
      <line x1="16" y1="16" x2="36" y2="46"
            stroke="#ff5500" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

      <!-- Impact shockwave rings -->
      <circle cx="0" cy="0" r="14" fill="none" stroke="#ff5500" stroke-width="1.2" opacity="0.45" stroke-dasharray="4 4"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="#ff5500" stroke-width="0.8" opacity="0.2" stroke-dasharray="2 6"/>

      <!-- Spark lines radiating from impact -->
      <line x1="0" y1="0" x2="12" y2="-16" stroke="#ffaa66" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <line x1="0" y1="0" x2="-14" y2="6"  stroke="#ffaa66" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      <line x1="0" y1="0" x2="4"  y2="18"  stroke="#ffaa66" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
      <line x1="0" y1="0" x2="-10" y2="-16" stroke="#ffaa66" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

      <!-- Impact core -->
      <circle cx="0" cy="0" r="6"   fill="#3a0800" stroke="#ff5500" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3"   fill="#ff5500"/>
      <circle cx="0" cy="0" r="1.5" fill="#ffddcc"/>
    </g>
  </g>
</svg>
