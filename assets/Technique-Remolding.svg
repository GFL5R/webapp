<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bloom"><feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigbloom"><feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg"><stop offset="0%" stop-color="#cc00ff" stop-opacity="0.3"/><stop offset="100%" stop-color="#06090d" stop-opacity="0"/></radialGradient>
    <radialGradient id="voidcore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#ff88ff"/>
      <stop offset="60%"  stop-color="#7700cc"/>
      <stop offset="100%" stop-color="#1a0030" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(60,60)">
    <circle cx="0" cy="0" r="55" fill="url(#bg)"/>

    <g filter="url(#bigbloom)" opacity="0.45">
      <circle cx="0" cy="0" r="24" fill="#9900ff"/>
    </g>

    <g filter="url(#glow)">
      <!-- Jagged outer ring: wildly varying radii per vertex — truly unstable -->
      <!-- Vertices at roughly every 30deg but with chaotic r values (28 to 48) -->
      <!-- Using raw x,y calculated: (r*sin(deg), -r*cos(deg)) -->
      <!-- 0°:r=44, 28°:r=34, 52°:r=48, 80°:r=30, 110°:r=46, 140°:r=36,
           165°:r=50, 195°:r=28, 220°:r=44, 248°:r=38, 278°:r=46, 310°:r=30, 338°:r=42 -->
      <polygon points="
        0,-44
        16,-30
        38,-30
        30,-5
        43,15
        23,28
        13,48
        -7,27
        -30,34
        -35,14
        -46,-6
        -23,-24
        -20,-40"
        fill="none" stroke="#cc44ff" stroke-width="2.2" stroke-linejoin="round" opacity="0.85"/>

      <!-- Inner irregular ring — different shape, offset -->
      <polygon points="
        6,-26
        18,-14
        22,4
        12,20
        -4,24
        -20,14
        -24,-6
        -12,-22"
        fill="none" stroke="#9922dd" stroke-width="1.3" stroke-linejoin="round" opacity="0.55"
        transform="rotate(15)"/>

      <!-- Energy spikes: wildly varying length, NOT evenly spaced -->
      <g stroke="#ee88ff" stroke-linecap="round">
        <!-- Long spikes -->
        <line x1="0"   y1="-44" x2="2"   y2="-60" stroke-width="2.5" opacity="0.95"/>
        <line x1="38"  y1="-30" x2="52"  y2="-40" stroke-width="2"   opacity="0.85"/>
        <line x1="43"  y1="15"  x2="58"  y2="20"  stroke-width="2.5" opacity="0.9"/>
        <line x1="-46" y1="-6"  x2="-62" y2="-8"  stroke-width="2"   opacity="0.85"/>
        <line x1="13"  y1="48"  x2="16"  y2="64"  stroke-width="2.5" opacity="0.95"/>
        <!-- Short spikes -->
        <line x1="16"  y1="-30" x2="20"  y2="-40" stroke-width="1.2" opacity="0.6"/>
        <line x1="30"  y1="-5"  x2="42"  y2="-8"  stroke-width="1"   opacity="0.5"/>
        <line x1="23"  y1="28"  x2="32"  y2="38"  stroke-width="1.5" opacity="0.65"/>
        <line x1="-7"  y1="27"  x2="-10" y2="40"  stroke-width="1"   opacity="0.5"/>
        <line x1="-30" y1="34"  x2="-42" y2="44"  stroke-width="1.5" opacity="0.7"/>
        <line x1="-35" y1="14"  x2="-50" y2="18"  stroke-width="1"   opacity="0.5"/>
        <line x1="-23" y1="-24" x2="-32" y2="-34" stroke-width="1.5" opacity="0.6"/>
        <line x1="-20" y1="-40" x2="-26" y2="-54" stroke-width="1.2" opacity="0.55"/>
      </g>

      <!-- Chaotic inner fracture lines — different lengths, non-symmetric -->
      <g stroke="#bb44ff" stroke-linecap="round">
        <line x1="0" y1="0" x2="20"  y2="-30" stroke-width="1.2" opacity="0.55"/>
        <line x1="0" y1="0" x2="-28" y2="-10" stroke-width="0.9" opacity="0.4"/>
        <line x1="0" y1="0" x2="26"  y2="18"  stroke-width="1.5" opacity="0.6"/>
        <line x1="0" y1="0" x2="-10" y2="30"  stroke-width="0.9" opacity="0.4"/>
        <line x1="0" y1="0" x2="10"  y2="28"  stroke-width="1.2" opacity="0.5"/>
        <line x1="0" y1="0" x2="-24" y2="16"  stroke-width="0.8" opacity="0.35"/>
        <line x1="0" y1="0" x2="18"  y2="-8"  stroke-width="0.9" opacity="0.4"/>
      </g>

      <!-- Swirling distorted void core — off-center rings -->
      <circle cx="0"  cy="0"  r="20" fill="url(#voidcore)" opacity="0.85"/>
      <circle cx="3"  cy="-3" r="12" fill="none" stroke="#dd55ff" stroke-width="1.5" opacity="0.5"/>
      <circle cx="-2" cy="2"  r="8"  fill="none" stroke="#bb33ee" stroke-width="1"   opacity="0.4"/>
      <circle cx="1"  cy="1"  r="6"  fill="#2a0050" stroke="#dd66ff" stroke-width="1.8"/>
      <circle cx="0"  cy="0"  r="3.5" fill="#ee88ff"/>
      <circle cx="0"  cy="0"  r="1.5" fill="#ffffff"/>
    </g>
  </g>
</svg>
