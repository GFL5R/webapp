<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bloom"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg"><stop offset="0%" stop-color="#cc44ff" stop-opacity="0.18"/><stop offset="100%" stop-color="#06090d" stop-opacity="0"/></radialGradient>
  </defs>
  <g transform="translate(60,60)">
    <circle cx="0" cy="0" r="55" fill="url(#bg)"/>
    <g filter="url(#bloom)" opacity="0.3">
      <path d="M-40,-30 Q-42,-52 0,-52 Q42,-52 42,-30 Q42,-2 14,8 L20,28 L-6,10 Q-42,10 -42,-30 Z" fill="#aa44ff"/>
    </g>
    <g filter="url(#glow)">
      <!-- Speech bubble — shifted upward to leave room for tail -->
      <path d="M-40,-30 Q-42,-52 0,-52 Q42,-52 42,-30 Q42,-2 14,8 L22,30 L-6,8 Q-42,8 -42,-30 Z"
            fill="#1a0030" stroke="#cc44ff" stroke-width="2" stroke-linejoin="round"/>

      <!-- Signal waves: classic wifi/broadcast arcs centered on a dot -->
      <!-- Transmitter dot at center-bottom of bubble interior -->
      <circle cx="0" cy="-10" r="4" fill="#cc44ff"/>
      <circle cx="0" cy="-10" r="2" fill="#f0aaff"/>

      <!-- Arc 1: small, close -->
      <path d="M-10,-10 A10,10 0 0,1 10,-10"
            fill="none" stroke="#cc44ff" stroke-width="2" stroke-linecap="round"/>
      <!-- Arc 2: medium -->
      <path d="M-22,-10 A22,22 0 0,1 22,-10"
            fill="none" stroke="#cc44ff" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
      <!-- Arc 3: large -->
      <path d="M-34,-10 A34,34 0 0,1 34,-10"
            fill="none" stroke="#cc44ff" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
    </g>
  </g>
</svg>
