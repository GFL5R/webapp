<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bloom"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg"><stop offset="0%" stop-color="#ffaa00" stop-opacity="0.2"/><stop offset="100%" stop-color="#06090d" stop-opacity="0"/></radialGradient>
  </defs>
  <g transform="translate(60,60)">
    <circle cx="0" cy="0" r="55" fill="url(#bg)"/>
    <g filter="url(#bloom)" opacity="0.3">
      <polygon points="0,-50 46,24 -46,24" fill="#ffaa00"/>
    </g>
    <g filter="url(#glow)">
      <!-- Triangle outline — street/warning shape -->
      <polygon points="0,-50 46,24 -46,24"
               fill="#1a0e00" stroke="#ffaa00" stroke-width="2" stroke-linejoin="round"/>
      <!-- Inner triangle — border detail -->
      <polygon points="0,-36 33,18 -33,18"
               fill="none" stroke="#ffaa00" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>
      <!-- Eye in triangle: ellipse with iris -->
      <ellipse cx="0" cy="4" rx="20" ry="13" fill="#1a0e00" stroke="#ffaa00" stroke-width="1.5"/>
      <!-- Iris -->
      <circle cx="0" cy="4" r="7" fill="#2a1400" stroke="#ffbb22" stroke-width="1.2"/>
      <!-- Pupil -->
      <circle cx="0" cy="4" r="4" fill="#ffaa00"/>
      <circle cx="0" cy="4" r="2" fill="#ffeeaa"/>
      <!-- Eyelid lines -->
      <path d="M-20,4 Q0,-8 20,4" fill="none" stroke="#ffaa00" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
      <path d="M-20,4 Q0,16 20,4" fill="none" stroke="#ffaa00" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
      <!-- Glint -->
      <circle cx="3" cy="1" r="1.5" fill="#ffffff" opacity="0.7"/>
    </g>
  </g>
</svg>
