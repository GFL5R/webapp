<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="240" height="240">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="blast-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#fffbe0"/>
      <stop offset="55%"  stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(60,60)" filter="url(#glow)">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#ff8800" stroke-width="12" opacity="0.08"/>
    <g fill="#ffcc22">
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(0)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(45)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(90)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(135)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(180)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(225)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(270)"/>
      <polygon points="0,-52  -5,-14  5,-14"  transform="rotate(315)"/>
    </g>
    <g fill="#ff8800" opacity="0.75">
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(22.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(67.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(112.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(157.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(202.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(247.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(292.5)"/>
      <polygon points="0,-36  -3,-12  3,-12"  transform="rotate(337.5)"/>
    </g>
    <circle cx="0" cy="0" r="18" fill="url(#blast-core)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#ffee88" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="7" fill="#ffffff"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
  </g>
</svg>
