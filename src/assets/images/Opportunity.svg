<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff9900" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06090d" stop-opacity="0"/>
    </radialGradient>
    <!-- Per-petal gradient: bright at tip, darker at base -->
    <linearGradient id="petal-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#7a3800"/>
      <stop offset="60%"  stop-color="#5a2600"/>
      <stop offset="100%" stop-color="#3a1400"/>
    </linearGradient>
  </defs>

  <g transform="translate(60,60)">
    <circle cx="0" cy="0" r="55" fill="url(#bg-glow)"/>

    <!-- Outer bloom -->
    <g filter="url(#outerglow)" opacity="0.5">
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z" fill="#ffaa00" transform="rotate(0)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z" fill="#ffaa00" transform="rotate(60)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z" fill="#ffaa00" transform="rotate(120)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z" fill="#ffaa00" transform="rotate(180)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z" fill="#ffaa00" transform="rotate(240)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z" fill="#ffaa00" transform="rotate(300)"/>
    </g>

    <!-- Petals: narrower, sharper tip -->
    <g filter="url(#glow)">
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z"
            fill="url(#petal-grad)" stroke="#ffaa00" stroke-width="1.6" stroke-linejoin="round" transform="rotate(0)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z"
            fill="url(#petal-grad)" stroke="#ffaa00" stroke-width="1.6" stroke-linejoin="round" transform="rotate(60)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z"
            fill="url(#petal-grad)" stroke="#ffaa00" stroke-width="1.6" stroke-linejoin="round" transform="rotate(120)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z"
            fill="url(#petal-grad)" stroke="#ffaa00" stroke-width="1.6" stroke-linejoin="round" transform="rotate(180)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z"
            fill="url(#petal-grad)" stroke="#ffaa00" stroke-width="1.6" stroke-linejoin="round" transform="rotate(240)"/>
      <path d="M-4,-7 C-11,-18 -8,-40 0,-48 C8,-40 11,-18 4,-7 Z"
            fill="url(#petal-grad)" stroke="#ffaa00" stroke-width="1.6" stroke-linejoin="round" transform="rotate(300)"/>
    </g>

    <!-- Midrib spine: bright line up the center of each petal -->
    <g stroke="#ffdd55" stroke-width="1.2" opacity="0.85" stroke-linecap="round">
      <line x1="0" y1="-8"  x2="0" y2="-46" transform="rotate(0)"/>
      <line x1="0" y1="-8"  x2="0" y2="-46" transform="rotate(60)"/>
      <line x1="0" y1="-8"  x2="0" y2="-46" transform="rotate(120)"/>
      <line x1="0" y1="-8"  x2="0" y2="-46" transform="rotate(180)"/>
      <line x1="0" y1="-8"  x2="0" y2="-46" transform="rotate(240)"/>
      <line x1="0" y1="-8"  x2="0" y2="-46" transform="rotate(300)"/>
    </g>

    <!-- Side veins: angled circuit-trace style, like a Y fork -->
    <g stroke="#ff9900" stroke-width="0.9" opacity="0.65" stroke-linecap="round">
      <line x1="0" y1="-20" x2="-6" y2="-30" transform="rotate(0)"/>
      <line x1="0" y1="-20" x2=" 6" y2="-30" transform="rotate(0)"/>
      <line x1="0" y1="-20" x2="-6" y2="-30" transform="rotate(60)"/>
      <line x1="0" y1="-20" x2=" 6" y2="-30" transform="rotate(60)"/>
      <line x1="0" y1="-20" x2="-6" y2="-30" transform="rotate(120)"/>
      <line x1="0" y1="-20" x2=" 6" y2="-30" transform="rotate(120)"/>
      <line x1="0" y1="-20" x2="-6" y2="-30" transform="rotate(180)"/>
      <line x1="0" y1="-20" x2=" 6" y2="-30" transform="rotate(180)"/>
      <line x1="0" y1="-20" x2="-6" y2="-30" transform="rotate(240)"/>
      <line x1="0" y1="-20" x2=" 6" y2="-30" transform="rotate(240)"/>
      <line x1="0" y1="-20" x2="-6" y2="-30" transform="rotate(300)"/>
      <line x1="0" y1="-20" x2=" 6" y2="-30" transform="rotate(300)"/>
    </g>

    <!-- Hexagonal ring at petal bases -->
    <polygon points="0,-12 10.4,-6 10.4,6 0,12 -10.4,6 -10.4,-6"
             fill="none" stroke="#ffaa00" stroke-width="1.2" opacity="0.6"/>

    <!-- Small dot at each petal tip — circuit node -->
    <g fill="#ffcc44" opacity="0.9">
      <circle cx="0" cy="-48" r="2" transform="rotate(0)"/>
      <circle cx="0" cy="-48" r="2" transform="rotate(60)"/>
      <circle cx="0" cy="-48" r="2" transform="rotate(120)"/>
      <circle cx="0" cy="-48" r="2" transform="rotate(180)"/>
      <circle cx="0" cy="-48" r="2" transform="rotate(240)"/>
      <circle cx="0" cy="-48" r="2" transform="rotate(300)"/>
    </g>

    <!-- Center core -->
    <circle cx="0" cy="0" r="10" fill="#ff8800" opacity="0.2"/>
    <circle cx="0" cy="0" r="7"  fill="#cc5500"/>
    <circle cx="0" cy="0" r="4"  fill="#ffcc44"/>
    <circle cx="0" cy="0" r="1.8" fill="#ffffff"/>
  </g>
</svg>
