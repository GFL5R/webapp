<h2>
	Bound in Ink
</h2>
<h3>
	Mastery Ability
</h3>
<p>
	Once per scene, when you are targeted by an invocation or mahō technique, you may resist with a TN 4 Composition check. If you succeed, you absorb the invocation or mahō, nullify all of its effects and create a ward containing it (see page 190).
</p>
