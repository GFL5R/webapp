<h2>
	Yotogi's Piercing Gaze
</h2>
<h3>
	Mastery Ability
</h3>
<p>
	You can perceive beings that are normally invisible to human sight, such as spirits and characters concealed by supernatural abilities. When you deal damage to an Otherworldly being, you ignore an amount of resistance up to your ranks in Meditation.
</p>
