<h2>
	Akilah's Teachings
</h2>
<h3>
	School Ability
</h3>
<p>
	Once per round after an Attack action check against you fails, if you have a shield readied and the attack is at range 0–1, you may shield bash. If you do, the target suffers physical damage equal to your ranks in Fitness plus your school rank.
</p>
