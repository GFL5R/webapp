<h3>
	School Ability
</h3>
<p>
	At the start of each scene, choose one of the following terrain qualities: Dangerous, Entangling, Imbalanced, or Obscuring. Each friendly character within a number of range bands equal to your school rank ignores the negative effects of that terrain quality.
