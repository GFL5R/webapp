<h2>
	Eyes of Yotogi
</h2>
<h3>
	School Ability
</h3>
<p>
	Otherworldly beings treat your vigilance as being increased by your school rank. When you make a check to search for Otherworldly beings, or make an Initiative check in a conflict against them, if you succeed, add bonus successes equal to your school rank.
</p>
