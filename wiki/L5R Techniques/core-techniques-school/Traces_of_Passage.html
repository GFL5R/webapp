<h2>
	Traces of Passage
</h2>
<h3>
	School Ability
</h3>
<p>
	Once per scene as a Support action, you may scry to detect any supernatural abilities used at range 0–3 in the last day (such as invocations, mahō, and kihō). Reduce the TN of your checks to investigate this phenomenon by your school rank.
</p>
