<h2>
	Warded Shikigami
</h2>
<h3>
	School Ability
</h3>
<p>
	You can have a number of additional shikigami (see page 115) up to your school rank. Once per scene, after you perform an action, you may instruct one of your shikigami to perform an action, for which it benefits from your assistance.
</p>
